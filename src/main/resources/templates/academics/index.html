<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Academics | GCA School MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h3 mb-1">Academic Management</h1>
            <p class="text-secondary mb-0">Current and historical course sections, teacher assignments, and a base for gradebook workflows.</p>
        </div>
        <button class="btn btn-primary" disabled>Launch Gradebook</button>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Current sections</h2>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Term</th>
                        <th>Course</th>
                        <th>Title</th>
                        <th>Teacher</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="section : ${sections}">
                        <td th:text="${section.termName}"></td>
                        <td th:text="${section.courseCode}"></td>
                        <td th:text="${section.courseTitle}"></td>
                        <td th:text="${section.teacherName}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
