<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Parent Information | GCA School MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-xl-10">
            <div class="card border-0 shadow-sm">
                <div class="card-body p-4 p-lg-5">
                    <div class="d-flex justify-content-between align-items-start mb-4">
                        <div>
                            <h1 class="h3 mb-1">Update parent information</h1>
                            <p class="text-secondary mb-0">Maintain guardian contact, spouse access, and billing-recipient information separately from student enrollment.</p>
                        </div>
                        <a class="btn btn-outline-primary" th:href="@{/portal/guardian}">Back to portal</a>
                    </div>
                    <form method="post" th:action="@{/portal/guardian/profile}" th:object="${profileForm}">
                        <div th:replace="~{portal/fragments/profile-fields :: profileFields}"></div>
                        <div class="mt-4 text-end">
                            <button class="btn btn-primary" type="submit">Save parent information</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
</body>
</html>
