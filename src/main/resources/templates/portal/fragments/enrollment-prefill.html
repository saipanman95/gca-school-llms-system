<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="prefillPanel" class="row g-3">
    <div class="col-12">
        <div class="alert alert-info mb-0">
            <div class="fw-semibold" th:text="${prefill.currentStudentLabel}">Student prefill</div>
            <div class="small">
                Recommended next grade:
                <span th:text="${prefill.recommendedGradeLabel}">10</span>
            </div>
        </div>
    </div>
    <div class="col-md-6">
        <label class="form-label">Student first name</label>
        <input class="form-control" th:field="*{studentFirstName}" type="text">
    </div>
    <div class="col-md-6">
        <label class="form-label">Student last name</label>
        <input class="form-control" th:field="*{studentLastName}" type="text">
    </div>
    <div class="col-md-6">
        <label class="form-label">Requested grade level</label>
        <select class="form-select" th:field="*{requestedGradeLevel}">
            <option th:each="gradeLevel : ${gradeLevels}" th:value="${gradeLevel}" th:text="${gradeLevel.label}"></option>
        </select>
    </div>
    <div class="col-md-6">
        <label class="form-label">Campus</label>
        <select class="form-select" th:field="*{campusId}">
            <option th:each="campus : ${campuses}" th:value="${campus.id}" th:text="${campus.displayName}"></option>
        </select>
    </div>
    <div class="col-12 pt-3" th:replace="~{portal/fragments/profile-fields :: profileFields}"></div>
    <div class="col-12 pt-3">
        <div class="border rounded-3 p-3 border-secondary-subtle">
            <h3 class="h6 text-uppercase text-secondary mb-3">Student Immigration Status</h3>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Student citizenship status</label>
                    <input class="form-control" th:field="*{studentCitizenshipStatus}" type="text">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Country of citizenship</label>
                    <input class="form-control" th:field="*{studentCountryOfCitizenship}" type="text">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" th:field="*{studentVisaRequired}" type="checkbox">
                        <label class="form-check-label" for="studentVisaRequired">Visa required</label>
                    </div>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Visa type</label>
                    <input class="form-control" th:field="*{studentVisaType}" type="text">
                </div>
                <div class="col-md-4">
                    <label class="form-label">Visa number</label>
                    <input class="form-control" th:field="*{studentVisaNumber}" type="text">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Visa issue date</label>
                    <input class="form-control" th:field="*{studentVisaIssueDate}" type="date">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Visa expiration date</label>
                    <input class="form-control" th:field="*{studentVisaExpirationDate}" type="date">
                </div>
                <div class="col-md-4 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" th:field="*{studentF1Required}" type="checkbox">
                        <label class="form-check-label" for="studentF1Required">F1 processing required</label>
                    </div>
                </div>
                <div class="col-md-8">
                    <label class="form-label">I-20 status</label>
                    <input class="form-control" th:field="*{studentI20Status}" type="text">
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
