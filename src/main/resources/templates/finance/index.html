<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Finance | GCA School MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>
<main class="container py-4">
    <div class="row g-4 mb-4">
        <div class="col-lg-8">
            <h1 class="h3 mb-1">Finance Operations</h1>
            <p class="text-secondary mb-0">Accounts receivable for families, tuition billing, and visibility into unpaid balances.</p>
        </div>
        <div class="col-lg-4">
            <div class="metric-card h-100">
                <div class="metric-label">Total outstanding</div>
                <div class="metric-value" th:text="${@moneyFormatter.format(outstandingBalance)}">$0</div>
            </div>
        </div>
    </div>
    <div class="card border-0 shadow-sm">
        <div class="card-body">
            <h2 class="h5 mb-3">Upcoming receivables</h2>
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                    <tr>
                        <th>Account</th>
                        <th>Description</th>
                        <th>Due</th>
                        <th>Status</th>
                        <th>Outstanding</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="invoice : ${invoices}">
                        <td th:text="${invoice.accountName}"></td>
                        <td th:text="${invoice.description}"></td>
                        <td th:text="${invoice.dueDate}"></td>
                        <td><span class="badge text-bg-warning" th:text="${invoice.status}"></span></td>
                        <td th:text="${@moneyFormatter.format(invoice.outstandingAmount)}"></td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</main>
</body>
</html>
