spring:
  application:
    name: school-ms
  datasource:
    url: jdbc:h2:file:./data/school-ms;MODE=MySQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  error:
    include-message: always
