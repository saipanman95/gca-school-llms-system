spring:
  application:
    name: school-ms
  datasource:
    url: jdbc:mysql://localhost:3306/school_ms?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: school_user
    password: change-me
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  thymeleaf:
    cache: false

server:
  error:
    include-message: always
